# =============================================================================
# server_hgt_200epoch.yaml — HGT baseline with 200 epochs (fair control)
#
# Purpose:
#   Train HGTBaseline for 200 epochs instead of the default 100.
#   Since MS-HGT runs 200 epochs, this provides a fair epoch-matched
#   baseline to separate macro improvements from training longer.
#
# This is experiment #1 in plan v2.0.
#
# Run with:
#   bash server_ops/run_job.sh remote_jobs/server_hgt_200epoch.yaml
# =============================================================================

# Model key
model: "hgt"

# Dataset
dataset: "processed/hetero_graph_dataset_v2"
split_mode: "by_sample"

# Hardware
device: "cuda"
num_workers: 4

# Training (200 epochs to match MS-HGT)
epochs: 200
batch_size: 8

# Naming
run_name: "server_hgt_200epoch"

# Checkpoint
save_best_model: true
save_last_model: true

# Artifact
package_artifact: true
