# ============================================================
# Unified Training Configuration
# ============================================================
# Shared across all models. Model-specific params go in models.yaml.
# ============================================================

# --- General ---
seed: 42
device: "cuda"                        # "cuda" or "cpu"
num_workers: 0                        # Windows: 0 for safety, >0 may cause multiprocessing issues

# --- Data ---
split_mode: "by_sample"               # by_sample | by_loadcase
batch_size: 64

# --- Model selection (key into models.yaml) ---
model_name: "mlp"

# --- Optimization ---
epochs: 100
optimizer: "adamw"                    # adam, adamw, sgd
lr: 0.001
weight_decay: 0.0001
scheduler: "reduce_on_plateau"        # reduce_on_plateau, cosine, null
scheduler_patience: 10
scheduler_factor: 0.5

# --- Loss ---
loss: "mse"                           # mse, l1 (smooth_l1 available)

# --- Early stopping ---
early_stopping: true
early_stopping_patience: 30
early_stopping_metric: "val_loss"     # val_loss or val_mae
early_stopping_mode: "min"            # min = lower is better

# --- Logging & output ---
output_root: "outputs"
log_interval: 50                      # log every N batches during training
